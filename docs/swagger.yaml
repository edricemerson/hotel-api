basePath: /api
definitions:
  entity.Booking:
    properties:
      check_in:
        type: string
      check_out:
        type: string
      created_at:
        type: string
      id:
        type: integer
      room:
        $ref: '#/definitions/entity.Room'
      room_id:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  entity.BookingRequest:
    properties:
      check_in:
        type: string
      check_out:
        type: string
      room_id:
        type: integer
    type: object
  entity.Room:
    properties:
      capacity:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      price:
        type: number
      room_number:
        type: string
      room_type:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  handler.LoginRequest:
    properties:
      email:
        example: john@example.com
        type: string
      password:
        example: password123
        type: string
    type: object
  handler.RegisterRequest:
    properties:
      email:
        example: john@example.com
        type: string
      name:
        example: John Doe
        type: string
      password:
        example: password123
        type: string
      phone:
        example: "+1234567890"
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: A comprehensive Hotel Management API with user authentication, room
    management, and booking system
  title: Hotel API
  version: "1.0"
paths:
  /bookings:
    get:
      consumes:
      - application/json
      description: Retrieve all bookings for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: List of user bookings
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized - invalid or missing token
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get all user bookings
      tags:
      - bookings
    post:
      consumes:
      - application/json
      description: Book a room for specified check-in and check-out dates (requires
        authentication)
      parameters:
      - description: Booking details with RoomID, CheckIn (YYYY-MM-DD), CheckOut (YYYY-MM-DD)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/entity.BookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Booking created successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body or date format
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized - invalid or missing token
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Create a new booking
      tags:
      - bookings
  /bookings/{id}:
    delete:
      consumes:
      - application/json
      description: Cancel an existing booking
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Booking deleted successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Failed to delete booking
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized - invalid or missing token
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Delete a booking
      tags:
      - bookings
    get:
      consumes:
      - application/json
      description: Retrieve details of a specific booking
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Booking details retrieved successfully
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Booking not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get booking by ID
      tags:
      - bookings
    put:
      consumes:
      - application/json
      description: Update booking details (check-in, check-out dates)
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated booking details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/entity.Booking'
      produces:
      - application/json
      responses:
        "200":
          description: Booking updated successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized - invalid or missing token
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Update a booking
      tags:
      - bookings
  /rooms:
    get:
      consumes:
      - application/json
      description: Retrieve a list of all available rooms
      produces:
      - application/json
      responses:
        "200":
          description: List of rooms retrieved successfully
          schema:
            items:
              $ref: '#/definitions/entity.Room'
            type: array
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all rooms
      tags:
      - rooms
    post:
      consumes:
      - application/json
      description: Add a new room to the hotel system
      parameters:
      - description: Room details
        in: body
        name: room
        required: true
        schema:
          $ref: '#/definitions/entity.Room'
      produces:
      - application/json
      responses:
        "201":
          description: Room created successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new room
      tags:
      - rooms
  /rooms/{id}:
    delete:
      consumes:
      - application/json
      description: Remove a room from the hotel system
      parameters:
      - description: Room ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Room deleted successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to delete room
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a room
      tags:
      - rooms
    get:
      consumes:
      - application/json
      description: Retrieve details of a specific room using its ID
      parameters:
      - description: Room ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Room details retrieved successfully
          schema:
            $ref: '#/definitions/entity.Room'
        "404":
          description: Room not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get room by ID
      tags:
      - rooms
    put:
      consumes:
      - application/json
      description: Update details of an existing room
      parameters:
      - description: Room ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated room details
        in: body
        name: room
        required: true
        schema:
          $ref: '#/definitions/entity.Room'
      produces:
      - application/json
      responses:
        "200":
          description: Room updated successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to update room
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a room
      tags:
      - rooms
  /users/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email and password, returns JWT token
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful with JWT token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid email or password
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to generate token
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User login
      tags:
      - users
  /users/register:
    post:
      consumes:
      - application/json
      description: Create a new user account with name, email, password and phone
      parameters:
      - description: User registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User registered successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body or user already exists
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - users
securityDefinitions:
  Bearer:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
